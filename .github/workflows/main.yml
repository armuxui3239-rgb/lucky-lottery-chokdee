name: 🚀 Lucky Lottery CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # ออกรางวัลอัตโนมัติ วันที่ 1 และ 16 เวลา 16:00 น. (ไทย) = 09:00 UTC
    - cron: '0 9 1,16 * *'
  workflow_dispatch:
    inputs:
      manual_draw:
        description: 'รันออกรางวัลด้วยมือ'
        required: false
        default: false
        type: boolean

jobs:
  # ==================== BUILD & DEPLOY ====================
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || github.event.inputs.manual_draw == false
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🏗️ Build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: npm run build
      
    - name: 🚀 Deploy to Netlify
      uses: nwtgck/actions-netlify@v3
      with:
        publish-dir: './dist'
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "Deploy from GitHub Actions"
        enable-pull-request-comment: true
        enable-commit-comment: true
        overwrites-pull-request-comment: true
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      timeout-minutes: 5

  # ==================== AUTO LOTTO DRAW ====================
  auto-lotto-draw:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.manual_draw == true
    
    steps:
    - name: 🎰 Auto Draw - ออกรางวัลอัตโนมัติ
      run: |
        echo "🎯 กำลังออกรางวัลสลาก..."
        
        # เรียก Edge Function สำหรับออกรางวัล
        RESPONSE=$(curl -s -X POST \
          "${{ secrets.SUPABASE_URL }}/functions/v1/auto-lotto-draw" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/json" \
          -w "\nHTTP_CODE:%{http_code}")
        
        HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
        BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
        
        echo "Response: $BODY"
        
        if [ "$HTTP_CODE" -eq 200 ]; then
          echo "✅ ออกรางวัลสำเร็จ!"
          echo "$BODY" | jq '.'
        else
          echo "❌ ออกรางวัลไม่สำเร็จ (HTTP $HTTP_CODE)"
          echo "$BODY"
          exit 0  # ไม่ fail workflow ถ้าไม่ใช่วันออกรางวัล
        fi
        
    - name: 📊 Log Result
      if: always()
      run: |
        echo "📝 Log เวลา: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "📝 เวลาไทย: $(TZ='Asia/Bangkok' date '+%Y-%m-%d %H:%M:%S')"

  # ==================== SECURITY SCAN ====================
  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔍 Scan for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --only-verified

  # ==================== NOTIFY ON SUCCESS ====================
  notify:
    runs-on: ubuntu-latest
    needs: [build-and-deploy, auto-lotto-draw]
    if: always() && (needs.build-and-deploy.result == 'success' || needs.auto-lotto-draw.result == 'success')
    
    steps:
    - name: 📢 Notify Discord/Slack (Optional)
      run: |
        echo "🎉 Deployment or Draw completed successfully!"
        # ถ้ามี Discord webhook ให้เพิ่มที่นี่
        # curl -X POST ${{ secrets.DISCORD_WEBHOOK }} -d '{"content":"🎰 ออกรางวัล/Deploy สำเร็จ!"}'
