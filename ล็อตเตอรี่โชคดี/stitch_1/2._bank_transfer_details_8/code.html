<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec131e",
                        "gold": "#FFD700",
                        "gold-dark": "#B8860B",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1a0809",
                        "admin-card": "#2a1214",
                    },
                    fontFamily: {
                        "display": ["Spline Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --primary-red: #ec131e;
        }
        .ios-toggle:checked + .toggle-bg {
            background-color: #34C759;
        }
        .ios-toggle:checked + .toggle-bg .toggle-dot {
            transform: translateX(1.25rem);
        }
        .color-swatch-active {
            border: 2px solid #FFD700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col bg-background-dark max-w-md mx-auto overflow-hidden">
<div class="flex items-center justify-between p-6 z-10 border-b border-white/5">
<div class="flex items-center gap-3">
<button class="size-8 rounded-full bg-white/5 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">arrow_back_ios_new</span>
</button>
<div class="flex flex-col">
<span class="text-gold font-bold text-[10px] uppercase tracking-[0.2em]">Step 2 of 2</span>
<h1 class="text-lg font-bold text-white">Wheel Theme Settings</h1>
</div>
</div>
<button class="px-4 py-1.5 bg-primary text-white text-xs font-bold rounded-full shadow-lg shadow-primary/20">
                SAVE
            </button>
</div>
<div class="flex-1 overflow-y-auto px-6 py-6 space-y-8 pb-32">
<section>
<label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 block">Live Preview</label>
<div class="relative w-full aspect-video bg-black/40 rounded-2xl border border-white/10 flex items-center justify-center overflow-hidden">
<div class="w-24 h-24 rounded-full border-4 border-gold relative opacity-80">
<div class="absolute inset-0 rounded-full" style="background: conic-gradient(#ec131e 0% 25%, #fff 25% 50%, #ec131e 50% 75%, #fff 75% 100%);"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="size-4 bg-gold rounded-full border-2 border-white"></div>
</div>
</div>
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-4 left-10 size-1 bg-gold rounded-full"></div>
<div class="absolute top-10 right-12 size-1.5 bg-primary rounded-full"></div>
<div class="absolute bottom-6 left-1/2 size-1 bg-white rounded-full"></div>
</div>
<div class="absolute bottom-3 right-3">
<button class="bg-white/10 backdrop-blur-md px-3 py-1.5 rounded-lg flex items-center gap-2 border border-white/10 hover:bg-white/20 transition-all">
<span class="material-symbols-outlined text-sm text-gold">play_circle</span>
<span class="text-[10px] font-bold">TEST ANIMATION</span>
</button>
</div>
</div>
</section>
<section class="space-y-4">
<div class="flex justify-between items-end">
<label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Wheel Color Palette</label>
<span class="text-[10px] text-primary font-bold italic">Classic Sakon</span>
</div>
<div class="grid grid-cols-4 gap-3">
<button class="aspect-square rounded-xl bg-gradient-to-br from-primary to-white color-swatch-active relative">
<span class="absolute top-1 right-1 material-symbols-outlined text-gold text-xs">check_circle</span>
</button>
<button class="aspect-square rounded-xl bg-gradient-to-br from-purple-600 to-pink-400 opacity-60"></button>
<button class="aspect-square rounded-xl bg-gradient-to-br from-blue-600 to-cyan-400 opacity-60"></button>
<button class="aspect-square rounded-xl bg-gradient-to-br from-orange-500 to-yellow-300 opacity-60"></button>
</div>
</section>
<section class="space-y-4">
<label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Win Celebration Effect</label>
<div class="grid grid-cols-1 gap-3">
<div class="bg-admin-card p-4 rounded-xl border border-white/10 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-gold/10 flex items-center justify-center">
<span class="material-symbols-outlined text-gold">celebration</span>
</div>
<div>
<p class="text-sm font-bold">Confetti Shower</p>
<p class="text-[10px] text-slate-400">Multi-colored paper pieces</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only ios-toggle" type="checkbox"/>
<div class="w-11 h-6 bg-white/10 rounded-full toggle-bg transition-colors">
<div class="absolute left-[2px] top-[2px] bg-white size-5 rounded-full toggle-dot transition-transform"></div>
</div>
</label>
</div>
<div class="bg-admin-card p-4 rounded-xl border border-white/10 flex items-center justify-between opacity-60">
<div class="flex items-center gap-3">
<div class="size-10 rounded-lg bg-white/5 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400">auto_awesome</span>
</div>
<div>
<p class="text-sm font-bold">Magic Sparkles</p>
<p class="text-[10px] text-slate-400">Glowing particle effects</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only ios-toggle" type="checkbox"/>
<div class="w-11 h-6 bg-white/10 rounded-full toggle-bg transition-colors">
<div class="absolute left-[2px] top-[2px] bg-white size-5 rounded-full toggle-dot transition-transform"></div>
</div>
</label>
</div>
</div>
</section>
<section class="space-y-4">
<div class="flex justify-between items-end">
<label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Spin Duration</label>
<span class="text-xs font-bold text-white">4.5 Seconds</span>
</div>
<input class="w-full h-1.5 bg-white/10 rounded-lg appearance-none cursor-pointer accent-primary" max="10" min="2" step="0.5" type="range" value="4.5"/>
<div class="flex justify-between text-[10px] text-slate-500 font-bold uppercase">
<span>Fast (2s)</span>
<span>Slow (10s)</span>
</div>
</section>
</div>
<div class="p-6 bg-gradient-to-t from-background-dark to-transparent flex flex-col items-center gap-6 absolute bottom-0 left-0 right-0">
<div class="flex w-full flex-row items-center justify-center gap-3">
<div class="h-1.5 w-1.5 rounded-full bg-white/20"></div>
<div class="h-1.5 w-8 rounded-full bg-primary shadow-[0_0_10px_rgba(236,19,30,0.4)]"></div>
</div>
<div class="h-1 w-32 bg-white/10 rounded-full"></div> 
</div>
</div>

</body></html>
