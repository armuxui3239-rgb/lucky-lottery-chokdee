<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec131e",
                        "gold": "#FFD700",
                        "gold-dark": "#B8860B",
                        "admin-bg": "#0f172a",
                        "admin-card": "#1e293b",
                        "success": "#22c55e",
                    },
                    fontFamily: {
                        "display": ["Spline Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.75rem", "lg": "1.5rem", "xl": "2.25rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --wheel-border: #FFD700;
        }
        .lucky-wheel-preview {
            background: conic-gradient(
                #ec131e 0deg 45deg, 
                #ffffff 45deg 90deg, 
                #ec131e 90deg 135deg, 
                #ffffff 135deg 180deg, 
                #ec131e 180deg 225deg, 
                #ffffff 225deg 270deg, 
                #ec131e 270deg 315deg, 
                #ffffff 315deg 360deg
            );
            border: 4px solid var(--wheel-border);
        }
        .wheel-segment-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0% 0%;
            width: 60px;
            text-align: right;
            font-weight: 700;
            font-size: 0.4rem;
            text-transform: uppercase;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
