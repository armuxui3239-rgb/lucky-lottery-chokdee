<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile &amp; Bank Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec131e",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221011",
                    },
                    fontFamily: {
                        "display": ["Spline Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Spline Sans', sans-serif;
        }
        .form-input:focus {
            border-color: #ec131e !important;
            ring-color: #ec131e !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Profile &amp; Bank Settings</h2>
</div>
<div class="flex w-full flex-row items-center justify-center gap-3 py-6">
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-2 w-8 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<main class="flex-1 px-4 pb-24 overflow-y-auto">
<section class="mb-8">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight mb-4 px-1">Personal Information</h3>
<div class="space-y-4">
<label class="flex flex-col w-full">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium pb-2 px-1">Full Name</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-4 text-base font-normal" placeholder="Enter your full name" type="text" value="John Sakon"/>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium pb-2 px-1">Phone Number</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-4 text-base font-normal" placeholder="+66 00 000 0000" type="tel" value="+66 81 234 5678"/>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium pb-2 px-1">Email Address</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-slate-400 p-4 text-base font-normal" placeholder="email@example.com" type="email" value="john.sakon@lottery.com"/>
</label>
</div>
</section>
<section class="mb-8">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight mb-4 px-1">Bank Account for Payouts</h3>
<div class="p-4 rounded-xl border border-primary/30 bg-primary/5 dark:bg-primary/10 mb-4 flex items-center gap-4">
<div class="size-12 rounded-lg bg-white dark:bg-slate-800 flex items-center justify-center border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-primary">account_balance</span>
</div>
<div class="flex-1">
<p class="text-slate-900 dark:text-white font-semibold">Kasikorn Bank</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">**** **** 4567</p>
</div>
<span class="material-symbols-outlined text-slate-400">check_circle</span>
</div>
<button class="w-full flex items-center justify-center gap-2 h-14 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-400 font-medium">
<span class="material-symbols-outlined">add</span>
                Link Another Bank Account
            </button>
</section>
<section class="space-y-4">
<button class="w-full h-14 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/20">
                Save Changes
            </button>
<button class="w-full h-14 bg-white dark:bg-slate-800 text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 rounded-xl font-semibold flex items-center justify-center gap-2">
<span class="material-symbols-outlined">lock_reset</span>
                Change Transaction PIN
            </button>
</section>
</main>
<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 pb-6 pt-3 flex justify-between items-center z-20">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">confirmation_number</span>
<span class="text-[10px] font-medium">Tickets</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">trophy</span>
<span class="text-[10px] font-medium">Results</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</nav>
</body></html>
