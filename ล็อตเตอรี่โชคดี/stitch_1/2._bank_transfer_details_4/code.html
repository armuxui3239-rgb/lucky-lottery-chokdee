<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec131e",
                        "gold": "#FFD700",
                        "gold-dark": "#B8860B",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221011",
                    },
                    fontFamily: {
                        "display": ["Spline Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .bg-gold-gradient {
                background: linear-gradient(135deg, #FFD700 0%, #FDB931 50%, #B8860B 100%);
            }
            .text-gold-gradient {
                background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden max-w-md mx-auto">
<div class="flex-1 p-6 filter blur-sm opacity-50 pointer-events-none">
<div class="flex items-center justify-between mb-8">
<span class="material-symbols-outlined text-3xl">menu</span>
<div class="bg-primary/10 px-4 py-1 rounded-full text-primary font-bold">Latest Results</div>
<span class="material-symbols-outlined text-3xl">notifications</span>
</div>
<div class="space-y-4">
<div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
<p class="text-xs uppercase tracking-widest text-slate-400 font-bold mb-2">Draw Date: 16 Oct 2023</p>
<div class="flex justify-between items-center">
<div class="text-4xl font-black tracking-tighter italic">118 999</div>
<div class="bg-primary text-white text-[10px] px-2 py-1 rounded font-bold">WINNER</div>
</div>
</div>
<div class="grid grid-cols-3 gap-2">
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl aspect-square flex items-center justify-center font-bold text-slate-300">224</div>
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl aspect-square flex items-center justify-center font-bold text-slate-300">512</div>
<div class="bg-white dark:bg-slate-800 p-4 rounded-xl aspect-square flex items-center justify-center font-bold text-slate-300">778</div>
</div>
</div>
</div>
<div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60 backdrop-blur-[2px]">
<div class="relative w-full max-w-sm bg-white dark:bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col items-center text-center p-8 border-4 border-gold/30" id="prize-result-modal">
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-10 left-10 text-gold opacity-40"><span class="material-symbols-outlined text-xl">star</span></div>
<div class="absolute top-20 right-12 text-primary opacity-40"><span class="material-symbols-outlined text-lg">favorite</span></div>
<div class="absolute bottom-40 left-16 text-gold opacity-40 rotate-12"><span class="material-symbols-outlined text-2xl">celebration</span></div>
<div class="absolute top-1/2 right-4 text-primary opacity-30"><span class="material-symbols-outlined text-3xl">token</span></div>
</div>
<div class="relative mb-6">
<div class="absolute inset-0 bg-gold/20 blur-3xl rounded-full scale-150"></div>
<div class="relative bg-gold-gradient p-6 rounded-full shadow-lg shadow-gold/40 border-4 border-white dark:border-slate-800">
<span class="material-symbols-outlined text-6xl text-white block leading-none" style="font-variation-settings: 'FILL' 1">trophy</span>
</div>
</div>
<h1 class="text-3xl font-black text-slate-900 dark:text-white mb-1 leading-tight tracking-tight">Congratulations!</h1>
<h2 class="text-2xl font-bold text-primary mb-6">You Won!</h2>
<div class="w-full bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-5 mb-6 border border-slate-100 dark:border-slate-700 relative overflow-hidden">
<div class="absolute top-0 left-0 h-full w-1.5 bg-primary"></div>
<p class="text-xs uppercase tracking-[0.2em] text-slate-400 dark:text-slate-500 font-bold mb-3">Winning Ticket Number</p>
<div class="flex items-center justify-center gap-3 mb-4">
<span class="text-3xl font-black tracking-widest text-slate-900 dark:text-white">118 999</span>
</div>
<div class="pt-4 border-t border-slate-200 dark:border-slate-700">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-1">Prize Amount</p>
<p class="text-3xl font-black text-gold-dark dark:text-gold tracking-tight">6,000,000 <span class="text-sm">THB</span></p>
</div>
</div>
<button class="w-full py-5 bg-primary hover:bg-red-600 text-white rounded-2xl font-bold text-xl shadow-xl shadow-primary/30 active:scale-[0.97] transition-all flex items-center justify-center gap-3">
<span>Claim Prize Now</span>
<span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
<button class="mt-6 text-slate-400 dark:text-slate-500 text-sm font-medium hover:text-slate-600 transition-colors">
                    View My Tickets
                </button>
</div>
</div>
</div>

</body></html>
