<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec131e",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221011",
                    },
                    fontFamily: {
                        "display": ["Spline Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            min-height: max(884px, 100dvh);
        }
        .ios-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden max-w-md mx-auto">
<div class="bg-primary p-4 pt-12 pb-6 text-white text-center relative">
<div class="absolute left-4 top-12 text-white cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back_ios</span>
</div>
<h1 class="text-xl font-bold tracking-tight">Claim Prize</h1>
<p class="text-white/80 text-xs mt-1 uppercase font-semibold tracking-widest">Step 2 of 4</p>
</div>
<div class="flex w-full flex-row items-center justify-center gap-3 py-6">
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-10 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
</div>
<div class="px-6 space-y-4">
<h3 class="text-slate-500 dark:text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Select Claim Method</h3>
<label class="relative flex items-center gap-4 bg-white dark:bg-slate-800 p-5 rounded-2xl border-2 border-primary shadow-sm cursor-pointer">
<input checked="" class="hidden" name="claim_method" type="radio"/>
<div class="bg-primary/10 text-primary p-3 rounded-xl">
<span class="material-symbols-outlined text-2xl">account_balance_wallet</span>
</div>
<div class="flex-1">
<p class="font-bold text-slate-900 dark:text-white">Direct Transfer to Wallet</p>
<p class="text-green-600 dark:text-green-400 text-xs font-semibold">Instant processing</p>
</div>
<div class="size-6 rounded-full border-2 border-primary flex items-center justify-center">
<div class="size-3 bg-primary rounded-full"></div>
</div>
</label>
<label class="relative flex items-center gap-4 bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm cursor-pointer opacity-80 hover:opacity-100 transition-opacity">
<input class="hidden" name="claim_method" type="radio"/>
<div class="bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 p-3 rounded-xl">
<span class="material-symbols-outlined text-2xl">account_balance</span>
</div>
<div class="flex-1">
<p class="font-bold text-slate-900 dark:text-white">Bank Transfer</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">1-3 business days</p>
</div>
<div class="size-6 rounded-full border-2 border-slate-300 dark:border-slate-600"></div>
</label>
</div>
<div class="px-6 mt-8">
<div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm">
<h4 class="text-sm font-bold text-slate-900 dark:text-white mb-4 border-b border-slate-50 dark:border-slate-700 pb-2">Breakdown</h4>
<div class="space-y-3">
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400">Prize Amount</span>
<span class="font-semibold text-slate-900 dark:text-white">฿100,000.00</span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400">Tax (1%)</span>
<span class="font-semibold text-slate-900 dark:text-white">-฿1,000.00</span>
</div>
<div class="pt-3 mt-3 border-t border-slate-100 dark:border-slate-700 flex justify-between items-center">
<span class="font-bold text-slate-900 dark:text-white">Net Amount</span>
<span class="text-2xl font-black text-primary">฿99,000.00</span>
</div>
</div>
</div>
</div>
<div class="mt-auto p-6 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-slate-100 dark:border-slate-800">
<button class="w-full py-4 bg-primary text-white rounded-xl font-bold text-lg shadow-xl shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Next</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
<p class="text-center text-slate-400 dark:text-slate-500 text-xs mt-4">
                Confirming will proceed to the next verification step.
            </p>
</div>
<div class="h-8"></div>
</div>

</body></html>
